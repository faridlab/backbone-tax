# =============================================================================
# Tax Hooks - engine rules (region-neutral) + write-path validation
# =============================================================================
# Declarative spec of src/application/service/tax_engine.rs + tax_write_service.rs, proven by
# tests/tax_golden_cases.rs. Indonesia RATES/CATEGORIES are seeded data (deferred), not rules here.

module: tax
version: 2

# No entity state machine — tax config is versioned by effective_from/effective_to, not a lifecycle.
state_machines: []

# -----------------------------------------------------------------------------
# Engine + write-path rules.
# -----------------------------------------------------------------------------
rules:
  - id: R1
    name: charge_computation
    when: calculate
    assert: "on_net_total => rate% of net; on_previous_row_total => rate% of (net + prior charges); actual => fixed amount"
    error_code: none
  - id: R2
    name: inclusive_extraction
    when: calculate
    assert: "is_inclusive => net = gross / (1 + sum on_net rates); tax = gross - net"
    error_code: none
  - id: R3
    name: effective_rate_selection
    when: calculate
    assert: "pick the row whose [effective_from, effective_to] window contains on_date"
    error_code: no_effective_rate
  - id: R4
    name: withholding_threshold
    when: resolve_withholding
    assert: "base >= threshold_amount => line = -(base * rate%); else no line"
    error_code: none
  - id: R5
    name: non_negative_base
    when: calculating
    assert: "base_amount >= 0"
    error_code: negative_base
  - id: R6
    name: template_exists_for_row
    when: adding_row
    assert: "template_id references an existing template"
    error_code: template_not_found
  - id: R7
    name: valid_effective_window
    when: adding_config
    assert: "effective_to is null or >= effective_from"
    error_code: invalid_date_range
  - id: R8
    name: unique_config_code
    when: creating_config
    assert: "code unique among non-deleted rows"
    error_code: duplicate_code
  # Council 2026-07-03
  - id: R9
    name: no_overlapping_effective_windows
    when: adding_row/creating_withholding
    assert: "no sibling at the same (template_id, sort_order) [or same withholding code] has an overlapping [effective_from, effective_to] window"
    error_code: overlapping_effective_window
    note: "enforced in the write path AND by an EXCLUDE USING gist DB constraint; calculate also DISTINCT-ON dedups per sort_order so a stray row never double-charges"
  - id: R10
    name: inclusive_reconciles_exactly
    when: calculate
    assert: "is_inclusive => Σ tax lines == gross - net exactly (last on_net line absorbs the rounding residual)"
    error_code: none
  - id: R11
    name: inclusive_only_on_net
    when: calculate
    assert: "an inclusive template may only carry on_net_total charge rows (grossing-up basis is otherwise undefined)"
    error_code: inclusive_cumulative_unsupported

# The seam: tax contributes LINES, never a posting.
events: {}

# Deferred overlay (authored later from DJP regulation): PPN 11%->12% seed rows, PPh 21/22/23/26/4(2)
# withholding categories, faktur-pajak numbering, e-Faktur/Coretax export, SPT reporting.
